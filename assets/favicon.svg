<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fgGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A8893E"/>
      <stop offset="50%"  stop-color="#F0E0B0"/>
      <stop offset="100%" stop-color="#A8893E"/>
    </linearGradient>
    <linearGradient id="fgShield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0F2545"/>
      <stop offset="100%" stop-color="#060F1A"/>
    </linearGradient>
    <linearGradient id="fgStar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#142F55"/>
      <stop offset="100%" stop-color="#0E2340"/>
    </linearGradient>
    <clipPath id="fgClip">
      <!-- Shield shape within 64×64 canvas -->
      <path d="M 6,16 Q 32,22 58,16 L 58,40 Q 57,52 32,62 Q 7,52 6,40 Z"/>
    </clipPath>
  </defs>

  <!-- Shield base -->
  <path d="M 6,16 Q 32,22 58,16 L 58,40 Q 57,52 32,62 Q 7,52 6,40 Z"
        fill="url(#fgShield)"/>

  <!-- Star-field top band -->
  <rect x="0" y="0" width="64" height="34"
        fill="url(#fgStar)" clip-path="url(#fgClip)"/>

  <!-- Subtle stripes (bottom) -->
  <g clip-path="url(#fgClip)" opacity="0.22">
    <rect x="6"  y="34" width="10" height="30" fill="#152E50"/>
    <rect x="24" y="34" width="10" height="30" fill="#152E50"/>
    <rect x="42" y="34" width="10" height="30" fill="#152E50"/>
  </g>

  <!-- Tiny stars (top section, tone-on-tone) -->
  <g clip-path="url(#fgClip)" fill="#FFFFFF" opacity="0.18">
    <polygon points="0,-4 0.95,-1.3 3.8,-1.3 1.55,0.5 2.35,3.25 0,1.65 -2.35,3.25 -1.55,0.5 -3.8,-1.3 -0.95,-1.3"
             transform="translate(19,24)"/>
    <polygon points="0,-4 0.95,-1.3 3.8,-1.3 1.55,0.5 2.35,3.25 0,1.65 -2.35,3.25 -1.55,0.5 -3.8,-1.3 -0.95,-1.3"
             transform="translate(32,20)"/>
    <polygon points="0,-4 0.95,-1.3 3.8,-1.3 1.55,0.5 2.35,3.25 0,1.65 -2.35,3.25 -1.55,0.5 -3.8,-1.3 -0.95,-1.3"
             transform="translate(45,24)"/>
  </g>

  <!-- Gold divider curve -->
  <path d="M 8,34 Q 32,30 56,34"
        fill="none" stroke="url(#fgGold)" stroke-width="0.8" opacity="0.55"/>

  <!-- Gold border -->
  <path d="M 6,16 Q 32,22 58,16 L 58,40 Q 57,52 32,62 Q 7,52 6,40 Z"
        fill="none" stroke="url(#fgGold)" stroke-width="2.5"/>

  <!-- Top bevel highlight -->
  <path d="M 6,16 Q 32,22 58,16 L 56,19 Q 32,25 8,19 Z"
        fill="url(#fgGold)" opacity="0.50"/>

  <!-- Bold "W" — readable at 16×16 favicon size -->
  <text x="32" y="50" text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', Palatino, serif"
        font-size="22" font-weight="700"
        fill="#F8F6F2">W</text>

</svg>
