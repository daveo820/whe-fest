<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <defs>
    <linearGradient id="goldBold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BA78"/>
      <stop offset="35%" style="stop-color:#E8D5A0"/>
      <stop offset="65%" style="stop-color:#C6A75E"/>
      <stop offset="100%" style="stop-color:#A8893E"/>
    </linearGradient>

    <linearGradient id="goldSweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A8893E"/>
      <stop offset="40%" style="stop-color:#E8D5A0"/>
      <stop offset="60%" style="stop-color:#D4BA78"/>
      <stop offset="100%" style="stop-color:#A8893E"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2240"/>
      <stop offset="100%" style="stop-color:#071422"/>
    </linearGradient>

    <linearGradient id="starGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A0"/>
      <stop offset="100%" style="stop-color:#C6A75E"/>
    </linearGradient>

    <filter id="powerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.25" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="goldOuterGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#C6A75E" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="lightBurst" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#FFFFFF; stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#C6A75E; stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#071422; stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="vig" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#0B1C2D; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#050D16; stop-opacity:0.85"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="url(#blueGrad)"/>

  <!-- Light burst behind -->
  <ellipse cx="350" cy="230" rx="300" ry="200" fill="url(#lightBurst)"/>

  <!-- Shield — outer -->
  <path d="M350,52 L568,80 L568,290 Q568,388 350,448 Q132,388 132,290 L132,80 Z"
        fill="none" stroke="url(#goldBold)" stroke-width="2" opacity="0.5"/>
  <!-- Shield — inner -->
  <path d="M350,64 L556,90 L556,286 Q556,378 350,436 Q144,378 144,286 L144,90 Z"
        fill="none" stroke="url(#goldBold)" stroke-width="0.5" opacity="0.25"/>

  <!-- ===== FIVE STARS — precisely centered, evenly spaced ===== -->
  <!-- Star helper: 5-point star centered at 0,0, radius ~14 -->
  <!-- Positions: x = 350 ± 0, ±70, ±130   y = center at 95 -->
  <g fill="url(#starGold)" opacity="0.85">
    <!-- Star 1 — far left -->
    <polygon points="0,-14 3.3,-4.3 13.3,-4.3 5,-1.7 8.2,11.3 0,5.4 -8.2,11.3 -5,-1.7 -13.3,-4.3 -3.3,-4.3"
             transform="translate(220, 95) scale(0.7)"/>
    <!-- Star 2 — left -->
    <polygon points="0,-14 3.3,-4.3 13.3,-4.3 5,-1.7 8.2,11.3 0,5.4 -8.2,11.3 -5,-1.7 -13.3,-4.3 -3.3,-4.3"
             transform="translate(285, 88) scale(0.85)"/>
    <!-- Star 3 — center (largest) -->
    <polygon points="0,-16 3.8,-5 15.2,-5 5.7,-2 9.4,13 0,6.2 -9.4,13 -5.7,-2 -15.2,-5 -3.8,-5"
             transform="translate(350, 82)"/>
    <!-- Star 4 — right -->
    <polygon points="0,-14 3.3,-4.3 13.3,-4.3 5,-1.7 8.2,11.3 0,5.4 -8.2,11.3 -5,-1.7 -13.3,-4.3 -3.3,-4.3"
             transform="translate(415, 88) scale(0.85)"/>
    <!-- Star 5 — far right -->
    <polygon points="0,-14 3.3,-4.3 13.3,-4.3 5,-1.7 8.2,11.3 0,5.4 -8.2,11.3 -5,-1.7 -13.3,-4.3 -3.3,-4.3"
             transform="translate(480, 95) scale(0.7)"/>
  </g>

  <!-- ===== WHE — big, bold, centered ===== -->
  <text x="350" y="248" text-anchor="middle"
        font-family="'Impact', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="148" font-weight="900" letter-spacing="16"
        fill="none" stroke="url(#goldBold)" stroke-width="3">WHE</text>
  <text x="350" y="248" text-anchor="middle"
        font-family="'Impact', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="148" font-weight="900" letter-spacing="16"
        fill="#FFFFFF" filter="url(#powerGlow)">WHE</text>

  <!-- ===== FEST — gold, bold, tracked ===== -->
  <text x="350" y="320" text-anchor="middle"
        font-family="'Impact', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="68" font-weight="900" letter-spacing="26"
        fill="url(#goldSweep)" filter="url(#goldOuterGlow)">FEST</text>

  <!-- Gold dividers -->
  <line x1="185" y1="342" x2="515" y2="342" stroke="url(#goldSweep)" stroke-width="1.5" opacity="0.7"/>
  <line x1="210" y1="349" x2="490" y2="349" stroke="url(#goldSweep)" stroke-width="0.5" opacity="0.3"/>

  <!-- WOMEN HEALTH EMPOWERMENT -->
  <text x="350" y="378" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" letter-spacing="7"
        fill="#C6A75E" opacity="0.95">WOMEN HEALTH EMPOWERMENT</text>

  <!-- WASHINGTON, DC · 2026 -->
  <text x="350" y="406" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="400" letter-spacing="5"
        fill="#F8F6F2" opacity="0.5">WASHINGTON, DC  ·  2026</text>

  <!-- Bottom accent star -->
  <polygon points="0,-10 2.4,-3.1 9.5,-3.1 3.6,-1.2 5.9,8 0,3.8 -5.9,8 -3.6,-1.2 -9.5,-3.1 -2.4,-3.1"
           transform="translate(350, 428)" fill="url(#starGold)" opacity="0.45"/>

  <!-- Vignette -->
  <rect width="700" height="500" fill="url(#vig)"/>
</svg>
